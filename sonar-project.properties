sonar.projectName=Flui Spec
sonar.projectVersion=0.1.0

sonar.sources=packages/flui-spec-js/src
sonar.tests=packages/flui-spec-js/test

sonar.test.inclusions=packages/flui-spec-js/test/**/*.test.ts

sonar.exclusions=**/dist/**,**/node_modules/**,**/coverage/**

sonar.coverage.exclusions=packages/flui-spec-js/src/types/**,packages/flui-spec-js/src/cli.ts,packages/flui-spec-js/src/index.ts

sonar.javascript.lcov.reportPaths=packages/flui-spec-js/coverage/lcov.info
sonar.typescript.tsconfigPath=packages/flui-spec-js/tsconfig.json

sonar.sourceEncoding=UTF-8

# projectKey, organization and host.url are passed by the runner:
#   - GitHub Actions (SonarCloud): flui-cloud_flui-spec @ sonarcloud.io
#   - Local docker scan (self-hosted): pnpm sonar:scan with FluiSpec @ localhost:9000
