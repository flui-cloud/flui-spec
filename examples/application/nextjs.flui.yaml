apiVersion: flui.cloud/v1beta1
kind: Application
metadata:
  name: marketing-site
build:
  strategy: dockerfile
  dockerfile: ./Dockerfile
  context: .
deploy:
  port: 3000
  exposure: public
  healthcheck:
    path: /api/health
  resources:
    profile: small
  scaling:
    min: 1
    max: 3
  domain:
    auto: true
    tls: true
    certificateProvider: lets-encrypt
  env:
    - name: NODE_ENV
      value: production
    - name: SESSION_SECRET
      valueFrom:
        generate: secret
        length: 48
        format: base64url
