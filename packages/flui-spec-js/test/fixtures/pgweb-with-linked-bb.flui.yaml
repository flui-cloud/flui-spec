kind: CatalogApp
apiVersion: flui/v1

metadata:
  id: pgweb
  name: pgweb
  description: >
    Lightweight web-based SQL browser for PostgreSQL. Install on top of a
    running Flui PostgreSQL building block: credentials flow from the DB's
    K8s Secret via secretKeyRef, they never pass through the dashboard.
  appKind: TOOL
  category: database-tools
  tags:
    - postgres
    - sql
    - web-client
    - admin
  license: MIT
  version: "0.16"
  maintainedAt: "2026-04-19"
  clientFor:
    - postgresql
  clientDefaultFor:
    - postgresql
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/pgweb.svg
  links:
    website: https://sosedoff.github.io/pgweb/
    docs: https://github.com/sosedoff/pgweb/wiki
    source: https://github.com/sosedoff/pgweb
  ratings:
    wow: 4
    utility: 5
    euFit: 4
    community: 4
  alternativeTo:
    - pgAdmin
    - Adminer
    - DBeaver Cloud

spec:
  type: standalone

  # pgweb is an admin tool for Postgres: it should never be on public
  # internet. Default it to internal exposure — the user reaches it only
  # from the Flui dashboard via the ForwardAuth proxy. No Ingress, no
  # public DNS, no certificate issued for it.
  exposure: internal

  image:
    registry: ghcr.io
    repository: sosedoff/pgweb
    tag: "0.16.2"

  ports:
    - name: http
      internal: 8081
      expose: true
      protocol: http

  env:
    - name: PGWEB_DATABASE_URL
      value: ""
      description: Composed at runtime by startCommand from PGUSER/PGPASSWORD/PGHOST/PGPORT/PGDATABASE
    - name: PGWEB_LOCK_SESSION
      value: "1"
      description: Hide pgweb's native Disconnect button and lock the login form. Flui manages the connection via secretKeyRef; the user never types credentials and should not be able to drop the session into a broken state.

  # PGUSER / PGPASSWORD / PGHOST / PGPORT / PGDATABASE are injected by the
  # backend at install time via `linkedBuildingBlock.envMapping`. Passwords
  # ride secretKeyRef → the pod reads them from Postgres's K8s Secret at
  # start; Flui never holds the plaintext.
  linkedBuildingBlocks:
    - ref: postgresql
      envMapping:
        - name: PGHOST
          fromService: host
        - name: PGPORT
          fromService: port
        - name: PGUSER
          fromBBEnv: POSTGRES_USER
        - name: PGPASSWORD
          fromBBEnv: POSTGRES_PASSWORD
        - name: PGDATABASE
          fromBBEnv: POSTGRES_DB

  # Conditional DATABASE_URL: export it only when PGHOST is non-empty, so
  # pgweb can start in its native "no connection" mode when the client is
  # installed but not yet linked to a database. In that mode pgweb still
  # opens the HTTP server on :8081 → readinessProbe passes, pod is 1/1
  # Ready, no crash-loop. On Connect the BB env becomes available, the
  # Deployment is rolled and this branch exports the URL → pgweb auto-
  # connects and serves the query UI. PGWEB_LOCK_SESSION=1 above hides
  # the native login/disconnect UI so the user cannot override what Flui
  # manages.
  startCommand: >-
    if [ -n "$PGHOST" ]; then
      export DATABASE_URL="postgres://$PGUSER:$PGPASSWORD@$PGHOST:$PGPORT/$PGDATABASE?sslmode=disable";
    fi;
    exec /usr/bin/pgweb --bind=0.0.0.0 --listen=8081

  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 250m
      memory: 128Mi

  scaling:
    horizontal:
      enabled: false
    vertical:
      enabled: true
      mode: Recreate
      bounds:
        cpu:
          min: 50m
          max: 500m
        memory:
          min: 32Mi
          max: 256Mi
      updatePolicy:
        trigger:
          - OOMKilled
        cooldown: 5m

  healthcheck:
    type: http
    path: /
    port: 8081
    interval: 30s
    timeout: 5s
    retries: 3

  auth:
    mode: native
